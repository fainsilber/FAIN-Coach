<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>FAIN Coach</title>
    <!--
      SPA fallback for GitHub Pages (rafgraph/spa-github-pages technique).
      Pages serves this file for any unknown path under the site; it rewrites
      the URL into a query the app decodes on load, so deep links / refreshes
      on client-side routes work. pathSegmentsToKeep = 1 preserves /FAIN-Coach.
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
